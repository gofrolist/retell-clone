{{- if .Values.secrets.create }}
# Placeholder plain Secret. In production prefer External Secrets Operator
# (or CSI secrets-store) syncing from GCP Secret Manager, then set
# secrets.create=false and secrets.existingSecret to the synced name.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "architeq.secretName" . }}
  labels:
    {{- include "architeq.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.values }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
