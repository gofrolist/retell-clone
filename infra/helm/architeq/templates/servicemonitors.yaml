{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-api
  labels:
    {{- include "architeq.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    {{- with .Values.monitoring.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "architeq.selectorLabels" (dict "root" . "component" "api") | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    {{- include "architeq.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    {{- with .Values.monitoring.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "architeq.selectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s
{{- end }}
