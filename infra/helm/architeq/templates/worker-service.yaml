# Headless metrics-only Service — exists so the ServiceMonitor can
# discover worker pods; workers pull jobs from LiveKit, nothing dials in.
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-worker-metrics
  labels:
    {{- include "architeq.labels" . | nindent 4 }}
    {{- include "architeq.selectorLabels" (dict "root" . "component" "worker") | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  clusterIP: None
  selector:
    {{- include "architeq.selectorLabels" (dict "root" . "component" "worker") | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.worker.metricsPort }}
      targetPort: metrics
