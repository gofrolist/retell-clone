apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    {{- include "arhiteq.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "arhiteq.selectorLabels" (dict "root" . "component" "dashboard") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arhiteq.selectorLabels" (dict "root" . "component" "dashboard") | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: {{ include "arhiteq.image" (dict "root" . "image" .Values.dashboard.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem omitted: Next.js writes to .next/cache at
            # runtime, so the root filesystem must stay writable.
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.containerPort }}
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.{{ .Values.global.domain }}"
            - name: NEXT_PUBLIC_LIVEKIT_URL
              value: "wss://livekit.{{ .Values.global.domain }}"
            {{- range $name, $value := .Values.dashboard.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
