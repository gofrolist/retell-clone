apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-worker
  labels:
    {{- include "arhiteq.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  {{- if not .Values.worker.hpa.enabled }}
  replicas: {{ .Values.worker.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "arhiteq.selectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "arhiteq.selectorLabels" (dict "root" . "component" "worker") | nindent 8 }}
        app.kubernetes.io/component: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.secrets.create }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccounts.worker.name }}
      # Give in-flight calls time to finish on scale-down / rollout.
      terminationGracePeriodSeconds: 600
      {{- with .Values.worker.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.worker.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "arhiteq.image" (dict "root" . "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          # Compatible with hostNetwork used for media; no privileged/caps needed.
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem omitted: the livekit-agents worker may
            # write temp/model files to its filesystem at runtime.
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - name: metrics
              containerPort: {{ .Values.worker.metricsPort }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ include "arhiteq.secretName" . }}
          env:
            - name: ARHITEQ_AGENT_NAME
              value: {{ .Values.worker.agentName | quote }}
            {{- range $name, $value := .Values.worker.env }}
            - name: {{ $name }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
