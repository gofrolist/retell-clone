apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dashboard
  labels:
    {{- include "arhiteq.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  annotations:
    cloud.google.com/neg: '{"ingress": true}'
    # Custom LB health check: Next.js redirects "/" (307 -> /agents), and GCE
    # health checks only accept a literal 200, which 502s the whole backend.
    cloud.google.com/backend-config: '{"default": "{{ .Release.Name }}-dashboard"}'
spec:
  type: ClusterIP
  selector:
    {{- include "arhiteq.selectorLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
