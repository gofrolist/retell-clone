apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ . }}
  {{- end }}
  # Preserve source IPs and skip the extra hop — SIP signalling replies
  # must come from the node that received the request.
  externalTrafficPolicy: Local
  ports:
    - name: sip-udp
      port: {{ .Values.config.sip_port }}
      targetPort: {{ .Values.config.sip_port }}
      protocol: UDP
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
