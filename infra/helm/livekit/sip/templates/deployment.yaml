apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  # hostNetwork + required anti-affinity: a rolling update can never place
  # the surge pod (same labels, same host ports), so replace outright.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      # hostNetwork so RTP (rtp_port range) is reachable on node IPs, per
      # the voice-pool firewall rules. One replica per node — host ports
      # (5060/RTP/health/metrics) cannot be shared.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: {{ .Chart.Name }}
                  app.kubernetes.io/instance: {{ .Release.Name }}
      containers:
        - name: sip
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: SIP_CONFIG_BODY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-config
                  key: config.yaml
          ports:
            - name: sip-udp
              containerPort: {{ .Values.config.sip_port }}
              protocol: UDP
            - name: health
              containerPort: {{ .Values.healthPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.prometheusPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
