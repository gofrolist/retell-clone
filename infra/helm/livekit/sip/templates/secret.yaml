{{- /* Config carries the LiveKit API secret, so it ships as a Secret
consumed via the SIP_CONFIG_BODY env var (same pattern as the official
egress/ingress charts). rtp_port is flattened to the "start-end" range
string the binary expects. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-config
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
stringData:
  config.yaml: |
    ws_url: {{ .Values.config.ws_url }}
    api_key: {{ .Values.config.api_key }}
    api_secret: {{ .Values.config.api_secret }}
    redis:
      address: {{ .Values.config.redis.address }}
    sip_port: {{ .Values.config.sip_port }}
    rtp_port: {{ .Values.config.rtp_port.start }}-{{ .Values.config.rtp_port.end }}
    use_external_ip: {{ .Values.config.use_external_ip }}
    log_level: {{ .Values.config.log_level }}
    health_port: {{ .Values.healthPort }}
    prometheus_port: {{ .Values.prometheusPort }}
