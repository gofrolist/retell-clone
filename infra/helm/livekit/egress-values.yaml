# Values for the official LiveKit egress chart (call recording):
#   helm install egress livekit/egress -n livekit -f egress-values.yaml
#
# The worker starts an audio-only room-composite egress per call
# (worker/src/arhiteq_worker/main.py `_start_recording`) with a GCS
# file output and no inline credentials — the egress pod authenticates
# to GCS via Workload Identity: the KSA below is bound to
# arhiteq-livekit-egress@PROJECT_ID.iam.gserviceaccount.com
# (terraform iam.tf `egress_wi`; the binding expects exactly
# livekit/livekit-egress, so keep the name and namespace).

replicaCount: 1

serviceAccount:
  create: true
  name: livekit-egress
  annotations:
    iam.gke.io/gcp-service-account: arhiteq-livekit-egress@PROJECT_ID.iam.gserviceaccount.com

egress:
  log_level: info
  health_port: 8080
  prometheus_port: 9090

  # Same key/secret as livekit-server-values.yaml.
  api_key: APIArhiteqKey
  api_secret: LIVEKIT_API_SECRET_CHANGE_ME
  ws_url: ws://livekit-server.livekit.svc.cluster.local:443

  # Egress receives jobs over the same Redis bus as livekit-server.
  # REDIS_HOST placeholder: terraform output `redis_host`.
  redis:
    address: REDIS_HOST:6379

# Pin to the voice node pool with the rest of LiveKit.
nodeSelector:
  workload: voice

tolerations:
  - key: dedicated
    operator: Equal
    value: voice
    effect: NoSchedule

# Audio-only OGG composites are light; no Chrome/video pipeline involved.
resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    memory: 2Gi
