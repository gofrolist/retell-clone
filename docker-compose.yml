# Local development dependencies for Arhiteq.
# App processes (api / worker / dashboard) run on the host via `make api`,
# `make worker`, `make web` for fast reload; this file provides the backing
# services only.

services:
  postgres:
    image: postgres:18@sha256:22c89fe0d0f507606260237fd55e51f6137f58b2d5bcf6152242b96d9fe8f9a4
    environment:
      POSTGRES_USER: arhiteq
      POSTGRES_PASSWORD: arhiteq
      POSTGRES_DB: arhiteq
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # postgres 18+ images keep data in /var/lib/postgresql/<major>/docker,
      # so the volume must cover /var/lib/postgresql (not .../data).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arhiteq -d arhiteq"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8@sha256:2838d5524559494f6f1cd66e97e76b200d64a633a8614200620755ed395daf32
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:v1.13.3@sha256:483b8b7b5b0654f91f1e8bdc7b46fcd37fd9911612ecf627f97e3185a89825bd
    # Dev mode: API key/secret pair is devkey/secret.
    command: --dev --bind 0.0.0.0
    ports:
      - "127.0.0.1:7880:7880"      # ws signalling
      - "127.0.0.1:7881:7881"      # ICE/TCP
      - "127.0.0.1:7882:7882/udp"  # media (dev mode single UDP port)
    depends_on:
      redis:
        condition: service_healthy

  # livekit-sip is intentionally not run locally — telephony testing
  # happens against the GKE deployment (needs a public IP for Telnyx).

volumes:
  pgdata:
