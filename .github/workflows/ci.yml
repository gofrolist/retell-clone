name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with: { python-version: "3.14" }
      - run: uv sync --locked
      - name: Contract + unit tests (with coverage gate)
        run: uv run --no-sync python -m pytest tests/ -q --cov=architeq_api --cov-report=term-missing --cov-fail-under=80
      - name: Lint
        run: uv run --no-sync ruff check src tests

  worker:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: worker }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with: { python-version: "3.14" }
      # dev group only: tests don't need the livekit-agents runtime stack
      - run: uv sync --locked --only-group dev
      - name: Tests (contract-critical modules gated)
        run: uv run --no-sync python -m pytest tests/ -q --cov=. --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run build

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: Terraform validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Helm lint
        run: helm lint infra/helm/architeq
