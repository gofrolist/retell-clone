name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.14" }
      - run: pip install -e ".[dev]"
      - name: Contract + unit tests (with coverage gate)
        run: python -m pytest tests/ -q --cov=app --cov-report=term-missing --cov-fail-under=80
      - name: Lint
        run: ruff check app tests

  worker:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: worker }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.14" }
      - run: pip install httpx prometheus-client pytest pytest-asyncio pytest-cov
      - name: Tests (contract-critical modules gated)
        run: python -m pytest tests/ -q --cov=. --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: frontend }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with: { bun-version: latest }
      - run: bun install --frozen-lockfile
      - run: bun run build

  infra:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      - name: Terraform validate
        working-directory: infra/terraform
        run: |
          terraform fmt -check -recursive
          terraform init -backend=false
          terraform validate
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
      - name: Helm lint
        run: helm lint infra/helm/architeq
