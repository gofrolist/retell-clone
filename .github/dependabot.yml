version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directories:
      - /backend
      - /worker
    schedule:
      interval: weekly

  # Frontend uses bun (bun.lock), not npm
  - package-ecosystem: bun
    directory: /frontend
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directories:
      - /backend
      - /worker
    schedule:
      interval: weekly

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
