version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: uv
    directories:
      - /backend
      - /worker
    schedule:
      interval: weekly

  - package-ecosystem: bun
    directory: /frontend
    schedule:
      interval: weekly
    ignore:
      # eslint-config-next's eslint-plugin-react cannot load under ESLint 10
      # (context.getFilename removal). Unignore once eslint-config-next
      # declares ESLint 10 support.
      - dependency-name: eslint
        versions: [">=10"]

  - package-ecosystem: docker
    directories:
      - /backend
      - /worker
    schedule:
      interval: weekly

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: terraform
    directory: /infra/terraform
    schedule:
      interval: weekly
